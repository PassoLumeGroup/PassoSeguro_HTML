<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - PassoSeguro</title>
    <link rel="icon" type="image/svg+xml" href="./assets/Icone.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#10b981',
                        secondary: '#ec4899',
                        accent: '#f472b6',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased font-sans">
    
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="map.html" class="flex items-center hover:opacity-90 transition-opacity">
                    <img src="./assets/Logo-verde.svg" alt="Logo PassoSeguro" class="h-10 md:h-12 w-auto object-contain drop-shadow-sm">
                </a>

                <nav class="hidden md:flex items-center gap-2">
                    <a href="map.html" class="px-4 py-2.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 hover:text-slate-900 flex items-center gap-2">
                        <i data-lucide="map" class="w-4 h-4"></i> Mapa
                    </a>
                    <a href="about.html" class="px-4 py-2.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 hover:text-slate-900 flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4"></i> Sobre
                    </a>
                    <a href="support.html" class="px-4 py-2.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 hover:text-slate-900 flex items-center gap-2">
                        <i data-lucide="life-buoy" class="w-4 h-4"></i> Suporte
                    </a>
                    <a href="add-point.html" class="px-4 py-2.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 hover:text-slate-900 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Adicionar Ponto
                    </a>
                    <a href="profile.html" class="px-4 py-2.5 rounded-2xl text-sm font-bold bg-primary text-white shadow-lg shadow-primary/20 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4"></i> Perfil
                    </a>
                    <div class="w-px h-6 bg-slate-200 mx-2"></div>
                    <a href="index.html" class="p-2.5 text-slate-400 hover:text-secondary hover:bg-secondary/5 rounded-2xl transition-all" title="Sair">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-1 py-16 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-[3rem] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
                <div class="bg-primary h-48 relative">
                    <div class="absolute -bottom-16 left-12">
                        <div class="relative">
                            <img src="https://i.pravatar.cc/300?img=32" class="w-32 h-32 rounded-[2.5rem] border-4 border-white shadow-xl object-cover" alt="Profile">
                            <button class="absolute bottom-0 right-0 bg-white p-2.5 rounded-xl shadow-lg text-primary hover:scale-110 transition-transform">
                                <i data-lucide="camera" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="pt-24 pb-12 px-12">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                        <div>
                            <h1 class="text-4xl font-display font-extrabold text-slate-900 mb-1">Maria Paula</h1>
                            <p class="text-slate-500 font-bold flex items-center gap-2">
                                <i data-lucide="map-pin" class="w-4 h-4 text-primary"></i>
                                Fortaleza, Ceará
                            </p>
                        </div>
                        <div class="flex gap-3">
                            <button class="px-6 py-3 bg-slate-50 text-slate-600 font-bold rounded-2xl hover:bg-slate-100 transition-all flex items-center gap-2">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                                Editar Perfil
                            </button>
                            <button class="px-6 py-3 bg-secondary/10 text-secondary font-bold rounded-2xl hover:bg-secondary/20 transition-all flex items-center gap-2">
                                <i data-lucide="shield" class="w-4 h-4"></i>
                                Verificação
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 text-center">
                            <span class="block text-3xl font-display font-extrabold text-primary mb-1">12</span>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pontos Sugeridos</span>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 text-center">
                            <span class="block text-3xl font-display font-extrabold text-primary mb-1">45</span>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Relatos Feitos</span>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 text-center">
                            <span class="block text-3xl font-display font-extrabold text-primary mb-1">156</span>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Irmãs Ajudadas</span>
                        </div>
                    </div>

                    <div class="space-y-8">
                        <h2 class="text-2xl font-display font-extrabold text-slate-900">Informações Pessoais</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-widest ml-1">E-mail</label>
                                <div class="p-5 bg-slate-50 rounded-2xl font-bold text-slate-900 border border-slate-100">
                                    maria3pqpaulaa@gmail.com
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-widest ml-1">Telefone</label>
                                <div class="p-5 bg-slate-50 rounded-2xl font-bold text-slate-900 border border-slate-100">
                                    (85) 99999-9999
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-16 pt-12 border-t border-slate-100 flex justify-between items-center">
                        <button class="text-slate-400 font-bold hover:text-secondary transition-colors flex items-center gap-2">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                            Excluir minha conta
                        </button>
                        <a href="index.html" class="px-8 py-4 bg-slate-900 text-white font-extrabold rounded-2xl hover:bg-slate-800 transition-all flex items-center gap-3">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                            Sair da Conta
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
